<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Güzel Beyza'm</title>
    <style>
        /* Genel Arka Plan - Açık Mor ve Pudra Tonları */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f3e5f5, #eae2b7, #fae1dd);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Hediye Kartı Kutusu - Bordo Detaylı */
        .card {
            background: rgba(255, 255, 255, 0.96);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(74, 4, 20, 0.15);
            text-align: center;
            max-width: 400px;
            width: 85%;
            z-index: 10;
            border: 2px solid #5c0618; /* Bordo Çerçeve */
            animation: acilisEfekti 1.5s ease-in-out;
        }

        /* Fotoğraf Galeri Alanı */
        .gallery-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 20px auto;
        }

        /* Fotoğraf Çerçevesi - Derin Mor ve Siyah Esintisi */
        .photo-frame {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #4a0414; /* Koyu Bordo Şerit */
            box-shadow: 0 8px 25px rgba(26, 0, 5, 0.3);
            animation: hafifYuzme 3s ease-in-out infinite alternate;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-frame img.active {
            display: block;
        }

        /* Galeri Butonları - Siyah ve Koyu Mor Tonları */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(42, 4, 12, 0.8); /* Koyu Bordo/Siyah */
            color: #ffffff;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 20;
        }

        .nav-btn:hover {
            background: #7209b7; /* Canlı Mor */
            scale: 1.1;
        }

        .prev-btn { left: -45px; }
        .next-btn { right: -45px; }

        /* Daktilo Yazı Efekti - Bordo Yazı Rengi */
        .typing-text {
            font-size: 22px;
            color: #4a0414; /* Bordo */
            font-weight: bold;
            border-right: 3px solid #7209b7; /* Mor İmleç */
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            margin: 0 auto 20px auto;
            animation: daktilo 4s steps(35) forwards, imlec 0.75s step-end infinite;
        }

        /* Alt Mesaj - Koyu Siyah/Mor Karışımı */
        .love-message {
            color: #2b2d42; /* Siyaha yakın koyu ton */
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 10px;
            opacity: 0;
            animation: yaziBelirme 2s ease-in-out 3.5s forwards;
        }

        /* Uçan Kalpler ve Parıltılar - Mor ve Bordo Tonlarında */
        .floating-heart {
            position: absolute;
            opacity: 0.6;
            animation: yukariUç 4s linear infinite;
            pointer-events: none;
        }

        /* ANIMASYONLAR */
        @keyframes acilisEfekti {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes hafifYuzme {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        @keyframes daktilo {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes imlec {
            from, to { border-color: transparent }
            50% { border-color: #7209b7; }
        }

        @keyframes yaziBelirme {
            to { opacity: 1; }
        }

        @keyframes yukariUç {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <div class="card">
        <!-- Fotoğraflar ve Butonlar -->
        <div class="gallery-container">
            <button class="nav-btn prev-btn" onclick="degistir(-1)">❮</button>
            <div class="photo-frame">
                <!-- Fotoğraf isimlerini tam olarak bilgisayarınızdaki halleriyle eşitledim -->
                <img src="20260521_120652.jpg" alt="Beyza 1" class="active">
                <img src="Screenshot_20260524-221902_Instagram.jpg" alt="Beyza 2">
                <img src="Screenshot_20260524-222021_Instagram.jpg" alt="Beyza 3">
            </div>
            <button class="nav-btn next-btn" onclick="degistir(1)">❯</button>
        </div>
        
        <!-- Beyza'ya Özel Başlık -->
        <div class="typing-text">İyi ki Benimsin Beyza... 💜</div>
        
        <!-- Beyza'ya Özel Alt Mesaj -->
        <div class="love-message">
            Gözlerinin içine her baktığımda ne kadar şanslı olduğumu bir kez daha anlıyorum. Paylaştığımız her an benim için çok değerli balkız. Seni çok seviyorum! 💜
        </div>
    </div>

    <script>
        // Fotoğraf Değiştirme Sistemi
        let aktifIndeks = 0;
        const fotograflar = document.querySelectorAll('.photo-frame img');

        function degistir(yon) {
            fotograflar[aktifIndeks].classList.remove('active');
            aktifIndeks += yon;

            if (aktifIndeks >= fotograflar.length) {
                aktifIndeks = 0;
            } else if (aktifIndeks < 0) {
                aktifIndeks = fotograflar.length - 1;
            }

            fotograflar[aktifIndeks].classList.add('active');
        }

        // Arka plan parıltıları (Bordo ve Mor Temalı)
        function kalpOlustur() {
            const container = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            
            const renkler = ['#7209b7', '#4a0414', '#b5179e', '#000000', '#f72585'];
            const ikonlar = ['💜', '❤️', '✨', '🖤'];
            
            heart.innerText = ikonlar[Math.floor(Math.random() * ikonlar.length)];
            heart.style.color = renkler[Math.floor(Math.random() * renkler.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 15 + 12 + 'px';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            
            container.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 4000);
        }
        setInterval(kalpOlustur, 300);
    </script>
</body>
</html>
